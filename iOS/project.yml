name: Coursewait
options:
  bundleIdPrefix: com.shimondeitel.coursewait
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Coursewait:
    type: application
    platform: iOS
    sources:
      - path: Coursewait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coursewait
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Coursewait/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CoursewaitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CoursewaitTests
      - path: Coursewait.storekit
    dependencies:
      - target: Coursewait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coursewait.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CoursewaitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CoursewaitUITests
    dependencies:
      - target: Coursewait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coursewait.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Coursewait:
    build:
      targets:
        Coursewait: all
        CoursewaitTests: [test]
        CoursewaitUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Coursewait.storekit
    test:
      config: Debug
      storeKitConfiguration: Coursewait.storekit
      targets:
        - CoursewaitTests
        - CoursewaitUITests
    archive:
      config: Release
